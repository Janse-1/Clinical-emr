{% for paciente in pacientes %}

<tr>

<td>{{ paciente.nombre }}</td>

<td>{{ paciente.identificacion }}</td>

<td>

<a href="{% url 'editar_paciente' paciente.id %}">
Editar
</a>

{% if paciente.expediente %}

<a href="{% url 'ver_expediente' paciente.expediente.id %}">
Ver expediente
</a>

{% else %}

<a href="{% url 'expediente_paciente' paciente.id %}">
Crear expediente
</a>

{% endif %}

</td>

</tr>

{% endfor %}
